; SeverActions — Custom AI Follower Detection via SPID
; ====================================================
;
; Distributes the SeverActions_CustomAIFollower keyword to modded followers
; that use their own custom AI systems (Inigo, Lucien, Kaidan, etc.).
;
; When SeverActions detects this keyword on a follower, it enters "tracking only"
; mode for that NPC: relationship assessments, gossip, diary reading, and PrismaUI
; visibility all work, but SeverActions will NOT override their AI packages,
; follow behavior, or outfit management.
;
; To add your own entries, use this format:
;   Keyword = 0x13C78B~SeverActions.esp|NPCName|NPCEditorID
;
; Requires: Spell Perk Item Distributor (SPID)
;           https://www.nexusmods.com/skyrimspecialedition/mods/36869
;
; ====================================================
; IMPORTANT: If the xEdit script assigned a different FormID than 0x000D70,
; update ALL lines below to match. Check xEdit Messages tab after running
; AddCustomAIKeyword.pas for the correct FormID.
; ====================================================

