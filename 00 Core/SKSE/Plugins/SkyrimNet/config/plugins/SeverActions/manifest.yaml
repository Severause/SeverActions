plugin:
  name: SeverActions
  version: "2.9.0"
  description: "SkyrimNet companion / outfit / arrest / cast-spell action pack"
  icon: "\U0001F30A"

# ── LLM Variants ──
# Each variant is a named LLM-config bucket. Background prompts (relationship
# assessment, banter, off-screen life, quest awareness, etc.) all go through
# the sever_background variant so users can route them to a cheaper model
# than their dialogue tier — these calls fire periodically and don't need the
# top-tier model that live conversation does.
#
# Empty override = fall through to the base OpenRouter config users already
# have set up. So zero behavior change for users who don't touch these.
variants:
  - name: sever_background
    description: "Background context prompts — relationship assessment, banter, off-screen life, quest awareness, reputation, inter-follower opinions. Override these to use a cheaper model and save on dialogue-budget tokens."

schema:
  fields:
    # ── LLM Overrides for sever_background variant ──
    # All fields are optional. Empty / 0 = inherit from base OpenRouter config.
    - name: "API Endpoint"
      path: "llm.endpoint"
      type: "string"
      description: "Custom API endpoint URL for background prompts (e.g., http://localhost:5000/v1 for a local model). Leave empty to use the base OpenRouter endpoint."
      defaultValue: ""
      category: "LLM Overrides"

    - name: "API Key"
      path: "llm.api_key"
      type: "string"
      description: "API key for the custom endpoint above. Leave empty to use the base OpenRouter API key."
      defaultValue: ""
      category: "LLM Overrides"

    - name: "Model Name"
      path: "llm.model_name"
      type: "string"
      description: "Override model for background prompts (e.g., 'meta-llama/llama-3.3-70b-instruct' or any OpenRouter model id). Leave empty to use the same model as dialogue. Background prompts run periodically and don't need a top-tier model."
      defaultValue: ""
      category: "LLM Overrides"

    - name: "Temperature"
      path: "llm.temperature"
      type: "float"
      description: "Override sampling temperature for background prompts. Set to 0 to inherit the base config value."
      defaultValue: 0
      min: 0.0
      max: 2.0
      category: "LLM Overrides"

    - name: "Max Tokens"
      path: "llm.max_tokens"
      type: "int"
      description: "Override max response tokens for background prompts. Set to 0 to inherit the base config value."
      defaultValue: 0
      min: 0
      max: 4096
      category: "LLM Overrides"

    - name: "Request Timeout (seconds)"
      path: "llm.timeout"
      type: "int"
      description: "Override request timeout in seconds for background prompts. Set to 0 to inherit the base config value."
      defaultValue: 0
      min: 0
      max: 120
      category: "LLM Overrides"
