plugin:
  name: "SeverActions"
  version: "0.99"
  description: "Configure SeverActions companion framework, actions, and subsystems"
  icon: "⚔️"

schema:
  fields:
    # ── Travel Tuning (NOT in MCM) ──
    - name: "Arrival Distance"
      path: "travel.arrival_distance"
      type: "float"
      description: "Distance (units) NPC must be within to count as arrived at destination"
      category: "Travel"
      defaultValue: 300.0
      min: 100
      max: 1000

    - name: "Default Wait Time (hours)"
      path: "travel.default_wait_hours"
      type: "float"
      description: "How long NPCs wait at their destination before returning"
      category: "Travel"
      defaultValue: 48.0
      min: 1
      max: 336

    - name: "Min Wait Time (hours)"
      path: "travel.min_wait_hours"
      type: "float"
      description: "Minimum wait time before travel resumes"
      category: "Travel"
      defaultValue: 6.0
      min: 1
      max: 48

    - name: "Max Wait Time (hours)"
      path: "travel.max_wait_hours"
      type: "float"
      description: "Maximum wait time at destination (1 week = 168)"
      category: "Travel"
      defaultValue: 168.0
      min: 24
      max: 672

    # ── Follower Settings ──
    - name: "Max Companions"
      path: "followers.max_companions"
      type: "int"
      description: "Maximum number of active followers"
      category: "Followers"
      defaultValue: 10
      min: 1
      max: 20

    - name: "Rapport Decay Rate"
      path: "followers.rapport_decay_rate"
      type: "float"
      description: "Multiplier for how fast rapport decays over time (1.0 = normal)"
      category: "Followers"
      defaultValue: 1.0
      min: 0.0
      max: 5.0

    - name: "Auto Relationship Assessment"
      path: "followers.auto_assessment"
      type: "bool"
      description: "Periodically assess follower relationships via LLM"
      category: "Followers"
      defaultValue: true

    - name: "Assessment Cooldown (hours)"
      path: "followers.assessment_cooldown_hours"
      type: "float"
      description: "Game hours between automatic relationship assessments per follower"
      category: "Followers"
      defaultValue: 5.0
      min: 1
      max: 48

    - name: "Allow Autonomous Leaving"
      path: "followers.allow_leaving"
      type: "bool"
      description: "Followers can leave on their own if relationship drops too low"
      category: "Followers"
      defaultValue: true

    - name: "Leaving Threshold"
      path: "followers.leaving_threshold"
      type: "int"
      description: "Rapport value below which a follower may leave (-100 to -10)"
      category: "Followers"
      defaultValue: -60
      min: -100
      max: -10

    # ── Survival ──
    - name: "Enable Survival System"
      path: "survival.enabled"
      type: "bool"
      description: "Track hunger, fatigue, and cold for followers"
      category: "Survival"
      defaultValue: false

    - name: "Hunger Rate"
      path: "survival.hunger_rate"
      type: "float"
      description: "Hunger depletion speed multiplier"
      category: "Survival"
      defaultValue: 1.0
      min: 0.1
      max: 5.0

    - name: "Fatigue Rate"
      path: "survival.fatigue_rate"
      type: "float"
      description: "Fatigue depletion speed multiplier"
      category: "Survival"
      defaultValue: 1.0
      min: 0.1
      max: 5.0

    - name: "Cold Rate"
      path: "survival.cold_rate"
      type: "float"
      description: "Cold accumulation speed multiplier"
      category: "Survival"
      defaultValue: 1.0
      min: 0.1
      max: 5.0

    # ── Spell Teaching ──
    - name: "Failure System"
      path: "spellteach.failure_enabled"
      type: "bool"
      description: "When enabled, learning spells above Novice tier can fail with school-specific consequences (explosions, hostile summons, stamina drain, etc.)"
      category: "Spell Teaching"
      defaultValue: true

    - name: "Failure Difficulty"
      path: "spellteach.failure_difficulty"
      type: "float"
      description: "Multiplier for failure chance. 0.5 = half as likely, 1.0 = normal, 2.0 = twice as likely. Set to 0 to disable failures without turning off the system."
      category: "Spell Teaching"
      defaultValue: 1.0
      min: 0.0
      max: 3.0

    # ── Dialogue ──
    - name: "Silence Chance"
      path: "dialogue.silence_chance"
      type: "int"
      description: "Probability (0-100) that silence is offered as an option in speaker selection. Higher = more pauses in conversation."
      category: "Dialogue"
      defaultValue: 50
      min: 0
      max: 100

    - name: "Companion Tag"
      path: "dialogue.tag_companion"
      type: "bool"
      description: "Show the [COMPANION] tag in speaker selection. When enabled, the AI knows which NPCs are your followers and weighs them more heavily for conversation. Disable to make companions less chatty."
      category: "Dialogue"
      defaultValue: true

    - name: "Engaged Tag"
      path: "dialogue.tag_engaged"
      type: "bool"
      description: "Show the [ENGAGED] tag in speaker selection. Engaged NPCs have a lower threshold to speak up. Disable to remove the engagement bias."
      category: "Dialogue"
      defaultValue: true

    - name: "In Scene Tag"
      path: "dialogue.tag_in_scene"
      type: "bool"
      description: "Show the [IN SCENE] tag in speaker selection. NPCs in intimate scenes are strongly deprioritized from speaking. Disable to remove this consideration."
      category: "Dialogue"
      defaultValue: true

    # ── Inventory ──
    - name: "Items Per Category"
      path: "inventory.item_limit"
      type: "int"
      description: "Maximum number of items shown per category in the player inventory prompt. Higher values give NPCs more visibility into your inventory but use more prompt tokens."
      category: "Inventory"
      defaultValue: 7
      min: 3
      max: 20

    # ── General ──
    - name: "Dialogue Animations"
      path: "general.dialogue_animations"
      type: "bool"
      description: "Play gesture animations during NPC dialogue"
      category: "General"
      defaultValue: true

    - name: "Book Reading Style"
      path: "general.book_reading_mode"
      type: "select"
      description: "How NPCs read books aloud. Verbatim reads word-for-word (can be lengthy). Summarize gives a brief summary with in-character reactions."
      category: "General"
      defaultValue: "verbatim"
      options:
        - "verbatim"
        - "summarize"

    - name: "Debug Mode"
      path: "general.debug_mode"
      type: "bool"
      description: "Enable debug logging for all SeverActions systems"
      category: "General"
      defaultValue: false
