name: "Player Uses Shout"
description: "Companions occasionally react to the player using a dragon shout."

eventCriteria:
  - eventType: "spell_cast"
    schemaConditions:
      - fieldPath: "actor"
        operator: "equals"
        value: "{{ player.name }}"
        caseSensitive: false
      - fieldPath: "spell"
        operator: "regex"
        value: "(unrelenting force|fire breath|frost breath|whirlwind sprint|become ethereal|dragonrend|storm call|call dragon|dragon aspect|slow time|marked for death|dismay|aura whisper|throw voice|ice form|kyne's peace|elemental fury|clear skies|call of valor|soul tear|bend will|cyclone|battle fury|drain vitality)"
        caseSensitive: false

response:
  type: "direct_narration"
  content: "{{ player.name }}'s Thu'um echoes across the land as they unleash {{ event_json.spell }}."

audience: "everyone"
enabled: true
probability: 0.15
cooldownSeconds: 900
priority: 4
