name: "Quest Completed"
description: "Companions acknowledge when a quest is completed."

eventCriteria:
  - eventType: "quest_start_stop"
    schemaConditions:
      - fieldPath: "started"
        operator: "equals"
        value: false

response:
  type: "direct_narration"
  content: "{{ player.name }} has completed the quest: {{ event_json.quest }}."

audience: "nearby_npcs"
enabled: false
probability: 0.55
cooldownSeconds: 600
priority: 5
