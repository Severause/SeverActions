name: "Dragon Slain"
description: "Companions react when a dragon is killed nearby."

eventCriteria:
  # Generic — any name containing "Dragon"
  - eventType: "death"
    schemaConditions:
      - fieldPath: "victim"
        operator: "contains"
        value: "Dragon"
        caseSensitive: false
  # Named vanilla dragons
  - eventType: "death"
    schemaConditions:
      - fieldPath: "victim"
        operator: "equals"
        value: "Mirmulnir"
  - eventType: "death"
    schemaConditions:
      - fieldPath: "victim"
        operator: "equals"
        value: "Sahloknir"
  - eventType: "death"
    schemaConditions:
      - fieldPath: "victim"
        operator: "equals"
        value: "Nahagliiv"
  - eventType: "death"
    schemaConditions:
      - fieldPath: "victim"
        operator: "equals"
        value: "Vuljotnaak"
  - eventType: "death"
    schemaConditions:
      - fieldPath: "victim"
        operator: "equals"
        value: "Viinturuth"
  - eventType: "death"
    schemaConditions:
      - fieldPath: "victim"
        operator: "equals"
        value: "Alduin"
  - eventType: "death"
    schemaConditions:
      - fieldPath: "victim"
        operator: "equals"
        value: "Odahviing"
  - eventType: "death"
    schemaConditions:
      - fieldPath: "victim"
        operator: "equals"
        value: "Paarthurnax"
  - eventType: "death"
    schemaConditions:
      - fieldPath: "victim"
        operator: "equals"
        value: "Durnehviir"
  - eventType: "death"
    schemaConditions:
      - fieldPath: "victim"
        operator: "equals"
        value: "Krosulhah"
  - eventType: "death"
    schemaConditions:
      - fieldPath: "victim"
        operator: "equals"
        value: "Kruziikrel"
  - eventType: "death"
    schemaConditions:
      - fieldPath: "victim"
        operator: "equals"
        value: "Relonikiv"
  - eventType: "death"
    schemaConditions:
      - fieldPath: "victim"
        operator: "equals"
        value: "Naaslaarum"
  - eventType: "death"
    schemaConditions:
      - fieldPath: "victim"
        operator: "equals"
        value: "Voslaarum"

response:
  type: "direct_narration"
  content: "The dragon {{ event_json.victim }} has been slain. Its massive body crashes to the ground as the Dragonborn absorbs its soul."

audience: "everyone"
enabled: true
probability: 0.85
cooldownSeconds: 900
priority: 10
