name: "Companion Injured"
description: "A follower enters bleedout during combat."

eventCriteria:
  - eventType: "enter_bleedout"
    schemaConditions:
      - fieldPath: "actor"
        operator: "not_equals"
        value: "{{ player.name }}"

response:
  type: "direct_narration"
  content: "{{ event_json.actor }} has been gravely wounded and falls to the ground."

audience: "everyone"
enabled: true
probability: 0.30
cooldownSeconds: 600
priority: 8
