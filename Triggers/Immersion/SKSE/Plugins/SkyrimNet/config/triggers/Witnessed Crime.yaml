name: "Witnessed Crime"
description: "Companions react when witnessing an NPC commit a crime."

eventCriteria:
  - eventType: "crime"
    schemaConditions:
      - fieldPath: "criminal"
        operator: "not_equals"
        value: "{{ player.name }}"

response:
  type: "direct_narration"
  content: "{{ event_json.criminal }} committed {{ event_json.crime_type }}{% if event_json.victim and event_json.victim != \"\" %} against {{ event_json.victim }}{% endif %}."

audience: "everyone"
enabled: true
probability: 0.30
cooldownSeconds: 900
priority: 3
