name: ModifyArousalSLO
description: "The speaker's blood runs hotter or cooler in the moment — a flirtation across a tavern table, a cold bucket of water to the face, a glance held a beat too long, a chastening word from a priest. Pushes arousal up or down."
questEditorId: SeverActions
scriptName: SeverActions_SLOArousal
executionFunctionName: ModifyArousal_Execute
parameterMapping:
  - type: speaker
    name: akActor
    description: the actor whose arousal is shifting
  - type: dynamic
    name: amount
    description: "how much the needle moves — negative cools them off (-2 to -20), positive stokes them (+2 to +15)"
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
