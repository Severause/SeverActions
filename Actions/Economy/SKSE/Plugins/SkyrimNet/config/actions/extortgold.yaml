customCategory: economy
name: ExtortGold
description: "Squeeze coin out of someone through threat or intimidation — a shakedown, protection money, a stick-up at knifepoint. The victim is not being asked."
questEditorId: SeverActions
scriptName: SeverActions_Currency
executionFunctionName: ExtortGold_Execute
parameterMapping:
  - type: speaker
    name: akExtorter
    description: the actor making the threat
  - type: dynamic
    name: akVictim
    description: the actor being shaken down
  - type: dynamic
    name: aiAmount
    description: how many gold coins are being demanded under threat
tags:
  - Currency
  - Hostile
  - Crime
enabled: true
defaultPriority: 6
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
