customCategory: economy
name: CreateRecurringDebt
description: "Strike an ongoing arrangement where coin changes hands on a steady schedule. Rent owed each week, monthly tribute to a thane, a hireling's regular wages, a guild's standing dues."
questEditorId: SeverActions
scriptName: SeverActions_Debt
executionFunctionName: CreateRecurringDebt_Execute
parameterMapping:
  - type: speaker
    name: akSpeaker
    description: the actor striking the arrangement (usually the one being paid each cycle)
  - type: dynamic
    name: akCreditor
    description: the actor collecting each cycle — the landlord, the thane, the guildmaster, the employer
  - type: dynamic
    name: akDebtor
    description: the actor paying each cycle — the tenant, the sworn man, the hireling
  - type: dynamic
    name: aiAmount
    description: gold owed per cycle
  - type: dynamic
    name: asReason
    description: "what the arrangement is for (e.g. 'room rental', 'protection money', 'weekly wages')"
    optional: true
    default: "unspecified"
  - type: dynamic
    name: aiIntervalDays
    description: days between charges (1=daily, 7=weekly, 30=monthly)
    optional: true
    default: 7
  - type: static
    value: 0
    name: aiCreditLimit
    description: the ceiling on accumulated balance in gold (0 = no ceiling)
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
