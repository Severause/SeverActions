customCategory: economy
name: ForgiveDebt
description: "Wipe a tab clean. The speaker lets the other person off the hook for what they owed — a kindness, a favor returned in spirit, or simply giving up on collecting."
questEditorId: SeverActions
scriptName: SeverActions_Debt
executionFunctionName: ForgiveDebt_Execute
parameterMapping:
  - type: speaker
    name: akSpeaker
    description: the actor letting the debt go — the one who is owed the coin
  - type: dynamic
    name: akTarget
    description: the actor being released from what they owed
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "is_in_faction"
        arguments: ["currentActor", "SeverActions_CreditorFaction"]
        comparisonOperator: "=="
        expectedValue: true
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
