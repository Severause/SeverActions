customCategory: economy
name: CollectPayment
description: "Take payment that's owed and ready to be paid — a tab settled at the bar, goods just changing hands, a job finished and the purse coming out."
questEditorId: SeverActions
scriptName: SeverActions_Currency
executionFunctionName: CollectPayment_Execute
parameterMapping:
  - type: speaker
    name: akCollector
    description: the actor receiving payment — the merchant at the counter, the innkeeper at the bar, the worker collecting their fee
  - type: dynamic
    name: akPayer
    description: the actor settling up — the customer, the patron, the one being charged
  - type: dynamic
    name: aiAmount
    description: how many gold coins are being handed over
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
