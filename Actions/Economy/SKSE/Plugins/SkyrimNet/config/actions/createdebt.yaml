customCategory: economy
name: CreateDebt
description: "Open a tab. One party fronts gold or goods now with the understanding the other will pay it back later — a merchant's slate, a smith fronting steel for repairs, a friend covering tonight's room at the inn."
questEditorId: SeverActions
scriptName: SeverActions_Debt
executionFunctionName: CreateDebt_Execute
parameterMapping:
  - type: speaker
    name: akSpeaker
    description: the actor opening the tab (typically the one fronting the goods or gold)
  - type: dynamic
    name: akCreditor
    description: the actor owed the coin — the merchant, the lender, the one who fronted the goods
  - type: dynamic
    name: akDebtor
    description: the actor on the hook — the customer, the borrower, the one who took the goods on credit
  - type: dynamic
    name: aiAmount
    description: starting balance of the tab in gold coins
  - type: dynamic
    name: asReason
    description: "what the tab is for (e.g. 'tavern tab', 'borrowed gold', 'armor repair')"
    optional: true
    default: "unspecified"
  - type: dynamic
    name: aiDueDays
    description: days until the tab is due (0 = no deadline)
    optional: true
    default: 0
  - type: dynamic
    name: aiCreditLimit
    description: the ceiling on the tab in gold (0 = no ceiling)
    optional: true
    default: 0
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
