customCategory: economy
name: GiveGold
description: "The speaker chooses to hand over coin freely — a gift, a generous tip, a finder's fee, or a reward for a job well done. Nothing is expected in return."
questEditorId: SeverActions
scriptName: SeverActions_Currency
executionFunctionName: GiveGold_Execute
parameterMapping:
  - type: speaker
    name: akGiver
    description: the actor parting with coin
  - type: dynamic
    name: akRecipient
    description: the actor receiving the coin
  - type: dynamic
    name: aiAmount
    description: how many gold coins change hands
enabled: true
defaultPriority: 6
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
