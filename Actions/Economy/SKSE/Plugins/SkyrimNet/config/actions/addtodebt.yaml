customCategory: economy
name: AddToDebt
description: "Add more weight to a tab the speaker is already keeping. Another round, another loaf, another repair — all going onto the same slate the other still owes."
questEditorId: SeverActions
scriptName: SeverActions_Debt
executionFunctionName: AddToDebt_Execute
parameterMapping:
  - type: speaker
    name: akSpeaker
    description: the actor adding the charge — the merchant ringing up another round, the smith logging another repair
  - type: dynamic
    name: akTarget
    description: the actor whose tab is growing
  - type: dynamic
    name: aiAmount
    description: additional gold being added to the tab
  - type: dynamic
    name: asReason
    description: "the original reason on the tab, for matching when the actor has multiple (leave empty to use whatever tab is found)"
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "is_in_faction"
        arguments: ["currentActor", "SeverActions_CreditorFaction"]
        comparisonOperator: "=="
        expectedValue: true
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
