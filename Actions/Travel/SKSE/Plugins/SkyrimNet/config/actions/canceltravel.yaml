customCategory: travel
name: CancelTravel
description: "The speaker thinks better of the road they were about to take — changes mind at the gate, decides the inn is fine after all, settles back into the chair by the fire. Any pending travel is called off and they stay right where they are."
questEditorId: SeverActions
scriptName: SeverActions_Travel
executionFunctionName: CancelTravel
parameterMapping:
  - type: speaker
    name: akNPC
    description: the actor who's no longer going anywhere
enabled: true
defaultPriority: 7
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
