customCategory: travel
name: ChangeTravelSpeed
description: "The speaker, already on the road, picks up the pace or slows it down — breaking into a run when news comes that a friend is in trouble, easing to a walk to take in the scenery on the way to High Hrothgar, jogging through a hostile stretch of moor."
questEditorId: SeverActions
scriptName: SeverActions_Travel
executionFunctionName: SetTravelSpeedNatural
parameterMapping:
  - type: speaker
    name: akNPC
    description: the actor changing their stride
  - type: dynamic
    name: speedText
    description: "how fast: run/hurry (fastest), jog/brisk (medium), walk/slow (slowest)"
enabled: false
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
