customCategory: travel
name: TravelToPlace
description: "The speaker sets out for somewhere specific when {{ player.name }} explicitly directs it — over to Whiterun on a courier run, upstairs at the inn, across the room to the forge, just outside for some air. Accepts a named location, a direction (outside, upstairs), or a nearby feature (bar, forge, bed)."
questEditorId: SeverActions
scriptName: SeverActions_Travel
executionFunctionName: TravelToPlace
parameterMapping:
  - type: speaker
    name: akNPC
    description: the actor heading off
  - type: dynamic
    name: placeName
    description: "where they're going: a named location, a direction (outside, upstairs), or a nearby feature (bar, forge, bed)"
  - type: static
    value: 24
    name: WaitHours
    description: how long (in hours) they'll wait at the destination before drifting back to whatever they were doing
  - type: static
    value: true
    name: stopFollowing
    description: whether to drop their following job while they make this trip
  - type: static
    value: 0
    name: Speed
    description: travel pace (0 = default natural speed)
enabled: false
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
