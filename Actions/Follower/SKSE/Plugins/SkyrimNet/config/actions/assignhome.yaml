name: AssignHome
description: "The follower marks this place as somewhere they belong — a room above the Bannered Mare, the upstairs of Breezehome, a homestead at Lakeview Manor. When the road parts and they're dismissed, this is where they'll head back to."
questEditorId: SeverActions
scriptName: SeverActions_FollowerManager
executionFunctionName: AssignHome
parameterMapping:
  - type: speaker
    name: akActor
    description: the follower putting down roots
  - type: dynamic
    name: locationName
    description: "the place to call home (e.g. 'Breezehome', 'Lakeview Manor', 'Bannered Mare')"
enabled: true
defaultPriority: 5
eligibilityRules:
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
eventString: "{{ actor.name }} now considers {{ locationName }} their home"
