name: SetCombatStyle
description: "{{ player.name }} gives the companion clear marching orders on how to fight from now on — 'hold the line', 'hang back with the bow', 'stick by me and patch wounds'. The companion adjusts their stance, drawn weapon, and discipline to match."
questEditorId: SeverActions
scriptName: SeverActions_FollowerManager
executionFunctionName: SetCombatStyle
parameterMapping:
  - type: speaker
    name: akActor
    description: the companion taking the new orders
  - type: dynamic
    name: style
    description: "how they're meant to fight. One of: aggressive, defensive, ranged, healer, balanced, melee, berserker, tank, archer, mage, spellsword, battlemage, champion, brawler, companion. 'healer' makes them a restoration-focused support — adds heal spells, hangs back, force-casts on hurt allies."
enabled: true
defaultPriority: 5
eligibilityRules:
  - conditions:
      - decoratorName: "is_follower"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: true
      - decoratorName: "is_in_faction"
        arguments: ["currentActor", "SeverActions_ActivelyFollowing"]
        comparisonOperator: "=="
        expectedValue: true
    logicalOperator: "OR"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
eventString: "{{ actor.name }} will now fight in a {{ style }} style"
