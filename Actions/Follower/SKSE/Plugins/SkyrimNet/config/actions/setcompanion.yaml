name: SetCompanion
description: "The speaker agrees to throw in with {{ player.name }} on the road ahead — a sellsword shaking on terms in a tavern back room, an old friend deciding to come along, a previously dismissed companion picking up the pack again. Use only when they genuinely consent to travel together."
questEditorId: SeverActions
scriptName: SeverActions_FollowerManager
executionFunctionName: RegisterFollower
parameterMapping:
  - type: speaker
    name: akActor
    description: the actor joining up with {{ player.name }}
enabled: true
defaultPriority: 6
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "is_follower"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
eventString: "{{ actor.name }} has joined {{ player.name }} as a companion"
