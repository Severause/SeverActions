name: FollowerLeaves
description: "The companion has had enough — they unbuckle the pack, drop it at {{ player.name }}'s feet, and walk away for good. Maybe a final shouting match outside the inn, maybe a silent departure before dawn. EXTREMELY RARE — only after long, severe mistreatment and rapport / trust ground all the way down."
questEditorId: SeverActions
scriptName: SeverActions_FollowerManager
executionFunctionName: FollowerLeaves
parameterMapping:
  - type: speaker
    name: akActor
    description: the companion walking out for good
enabled: true
defaultPriority: 9
eligibilityRules:
  - conditions:
      - decoratorName: "is_follower"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: true
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
eventString: "{{ actor.name }} has decided to leave {{ player.name }}'s service"
