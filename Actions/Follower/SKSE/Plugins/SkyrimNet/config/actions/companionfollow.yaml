name: CompanionFollow
description: "The companion was waiting where {{ player.name }} left them — leaning by the inn fire, posted at the city gate, sat on a barrel at the docks — and now shoulders their pack and falls back in step. Use when returning to a waiting companion and asking them to come along."
questEditorId: SeverActions
scriptName: SeverActions_FollowerManager
executionFunctionName: CompanionFollow
parameterMapping:
  - type: speaker
    name: akActor
    description: the companion picking up the road again
enabled: true
defaultPriority: 7
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
eventString: "{{ actor.name }} stopped waiting and is following {{ player.name }} again"
isShortLived: true
