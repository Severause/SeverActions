name: DismissFollower
description: "{{ player.name }} parts ways with this companion for now — a handshake at the city gate, a nod across a tavern table, a quiet thank-you on the road. They head back to whatever place they call home and can be picked up again later. DismissFollower = the road parts here for now. CompanionWait = stay temporarily on this spot. FollowerLeaves = walking out for good."
questEditorId: SeverActions
scriptName: SeverActions_FollowerManager
executionFunctionName: DismissCompanion
parameterMapping:
  - type: speaker
    name: akActor
    description: the companion being sent home
enabled: true
defaultPriority: 6
eligibilityRules:
  - conditions:
      - decoratorName: "is_follower"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: true
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
eventString: "{{ actor.name }} has parted ways with {{ player.name }}"
isShortLived: true
