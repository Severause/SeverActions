name: CompanionWait
description: "The companion plants their feet right here and settles in to wait for {{ player.name }} — propped against a wagon, warming hands at a brazier, idling at the bar. They'll wander nearby on their own business until {{ player.name }} comes back."
questEditorId: SeverActions
scriptName: SeverActions_FollowerManager
executionFunctionName: CompanionWait
parameterMapping:
  - type: speaker
    name: akActor
    description: the companion staying put
enabled: true
defaultPriority: 7
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
eventString: "{{ actor.name }} is waiting here for {{ player.name }}"
isShortLived: true
