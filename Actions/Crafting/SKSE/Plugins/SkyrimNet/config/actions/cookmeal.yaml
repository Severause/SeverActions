customCategory: crafting
name: CookMeal
description: "The speaker steps over to the cookpot, fires the spit, ladles out a portion when it's done, and brings it across to the one waiting — venison stew at a wayside camp, an apple cabbage broth at the inn, sweetrolls baked at the hearth and pressed into a child's hand."
questEditorId: SeverActions
scriptName: SeverActions_Crafting
executionFunctionName: CookMeal_Internal
parameterMapping:
  - type: speaker
    name: akActor
    description: the actor working the spit and ladle
  - type: dynamic
    name: recipeName
    description: what's on the menu (e.g. 'venison stew', 'sweetroll')
  - type: dynamic
    name: akRecipient
    description: the actor the bowl is going to
  - type: dynamic
    name: itemCount
    description: "how many portions — leave empty (or 1) for a single serving. Only use > 1 when the request clearly asks for multiples (e.g. 'cook three bowls of stew')."
    optional: true
    default: 1
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: is_in_combat
        arguments:
          - currentActor
        comparisonOperator: ==
        expectedValue: false
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
