customCategory: crafting
name: BrewPotion
description: "The speaker heads to the nearest alchemy lab, grinds the ingredients, decants the brew, and hands the finished bottle off to the one who needs it — a healing draught for a wounded friend, a fortifying tonic before a job, an antidote ground out in a back-room apothecary."
questEditorId: SeverActions
scriptName: SeverActions_Crafting
executionFunctionName: BrewPotion_Internal
parameterMapping:
  - type: speaker
    name: akActor
    description: the actor working the mortar and pestle
  - type: dynamic
    name: potionName
    description: "what's being brewed (e.g. 'health potion', 'fortify smithing')"
  - type: dynamic
    name: akRecipient
    description: the actor the finished bottle is going to
  - type: dynamic
    name: itemCount
    description: "how many to brew — leave empty (or 1) for a single bottle. Only use > 1 when the request clearly asks for multiples (e.g. 'brew three healing potions')."
    optional: true
    default: 1
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: is_in_combat
        arguments:
          - currentActor
        comparisonOperator: ==
        expectedValue: false
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
