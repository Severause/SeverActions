customCategory: crafting
name: CommissionItem
description: "The speaker takes a deferred order — they can't forge it on the spot, but they'll have it ready in a few days. Use this when the smith agrees to make something and tells the player to come back for it later: 'Aye, a steel greatsword — give me three days and a deposit.' Takes half the price up front; the rest is due when the player returns to collect. NOT for work done immediately (use CraftItem for that)."
questEditorId: SeverActions
scriptName: SeverActions_Crafting
executionFunctionName: CommissionItem_Internal
parameterMapping:
  - type: speaker
    name: akActor
    description: the smith taking the order
  - type: dynamic
    name: itemName
    description: "what's being commissioned (e.g. 'steel sword', 'dwarven armor')"
  - type: dynamic
    name: etaText
    description: "how long the smith says it'll take, in their own words (e.g. 'a couple days', 'about a week', 'tomorrow'). Phrase it naturally — the system converts this prose into the actual ready date, so match whatever the speaker just promised in dialogue."
  - type: dynamic
    name: itemCount
    description: "how many to make — leave empty (or 1) for a single piece. Only use > 1 when the request clearly asks for multiples (e.g. 'three steel daggers')."
    optional: true
    default: 1
  - type: dynamic
    name: quotedTotal
    description: "the TOTAL price in gold you, the smith, are charging for this whole order — your call, in character. This exact number is what the customer pays: half taken now as a deposit, half on pickup. Pass the SAME figure you said out loud (if you told them 'about eight hundred', pass 800). Price the job fairly by metal and effort: a steel sword is a few dozen septims, an ebony piece a few hundred, daedric work over a thousand. Whole number, gold only. Leave empty only if you truly never named a price."
    optional: true
    default: 0
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "is_in_faction"
        arguments: ["currentActor", "JobBlacksmithFaction"]
        comparisonOperator: "=="
        expectedValue: true
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
