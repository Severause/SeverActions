customCategory: crafting
name: CraftItem
description: "The speaker works the forge — hammer, tongs, quench — and walks the finished piece across to the one who commissioned it. An iron sword pulled hot off the anvil for a militiaman, a steel cuirass laid out on the workbench, a pair of daggers wrapped in oilcloth for a courier."
questEditorId: SeverActions
scriptName: SeverActions_Crafting
executionFunctionName: CraftItem_Internal
parameterMapping:
  - type: speaker
    name: akActor
    description: the smith at the anvil
  - type: dynamic
    name: itemName
    description: "what's being forged (e.g. 'iron sword', 'steel armor')"
  - type: dynamic
    name: akRecipient
    description: the actor the finished piece is going to
  - type: dynamic
    name: itemCount
    description: "how many to forge — leave empty (or 1) for a single piece. Only use > 1 when the request clearly asks for multiples (e.g. 'three iron daggers')."
    optional: true
    default: 1
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: is_in_combat
        arguments:
          - currentActor
        comparisonOperator: ==
        expectedValue: false
  - conditions:
      - decoratorName: is_in_faction
        arguments:
          - currentActor
          - JobBlacksmithFaction
        comparisonOperator: ==
        expectedValue: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
