customCategory: combat
name: CeaseFighting
description: "The speaker lowers their weapon and calls for a truce mid-fight — recognizing a misunderstanding, sparing a friend caught on the wrong side, or just deciding the brawl has gone far enough. Both combatants stand down."
questEditorId: SeverActions
scriptName: SeverActions_Combat
executionFunctionName: CeaseFire_Execute
parameterMapping:
  - type: speaker
    name: akActor1
    description: the actor calling the truce
  - type: dynamic
    name: akActor2
    description: the other combatant being asked to stand down
enabled: true
defaultPriority: 8
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: true
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
