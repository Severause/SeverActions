customCategory: combat
name: Yield
description: "The speaker drops their guard and throws up empty hands — a bandit who's lost the stomach for it, a wounded soldier sinking to one knee in the snow, a thief cornered in an alley. They surrender, hoping mercy will come."
questEditorId: SeverActions
scriptName: SeverActions_Combat
executionFunctionName: Yield_Execute
parameterMapping:
  - type: speaker
    name: akYielder
    description: the actor giving up the fight
enabled: true
defaultPriority: 8
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: true
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
