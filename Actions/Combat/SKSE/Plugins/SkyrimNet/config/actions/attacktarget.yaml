customCategory: combat
name: AttackTarget
description: "The speaker draws steel and lunges — a bandit breaking ambush, a jealous husband going for a rival's throat across a tavern, a Stormcloak charging an Imperial scout in the snow. Blades come out and the fight begins."
questEditorId: SeverActions
scriptName: SeverActions_Combat
executionFunctionName: AttackTarget_Execute
parameterMapping:
  - type: speaker
    name: akAttacker
    description: the actor making the first move
  - type: dynamic
    name: akTarget
    description: the actor on the receiving end of the blade
enabled: true
defaultPriority: 7
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
