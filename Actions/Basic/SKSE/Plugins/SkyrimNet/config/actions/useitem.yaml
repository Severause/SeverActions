customCategory: items
name: UseItem
description: "The speaker reaches into their pack and uses something they're carrying — drinking a potion to mend their wounds, biting into a hunk of bread to take the edge off hunger, popping a frost mirriam ingredient to test its sting."
questEditorId: SeverActions
scriptName: SeverActions_Loot
executionFunctionName: UseItem_Execute
parameterMapping:
  - type: dynamic
    name: akActor
    description: the actor reaching for something in their pack
  - type: dynamic
    name: itemName
    description: name of the consumable being used (e.g. "Health Potion", "Bread", "Frost Mirriam")
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
