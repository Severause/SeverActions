customCategory: items
name: LootContainer
description: "The speaker opens a chest, sack, barrel, drawer, or strongbox and helps themselves to what's inside. A bandit's stash unearthed, a forgotten endtable rifled through, a merchant's lockbox cracked open. Mode controls whether everything moves at once or only the worthwhile pieces."
questEditorId: SeverActions
scriptName: SeverActions_Loot
executionFunctionName: LootContainer_Execute
parameterMapping:
  - type: speaker
    name: akActor
    description: the actor reaching in to take
  - type: dynamic
    name: containerName
    description: name of the container being opened (e.g. "Chest", "Barrel", "Sack", "End Table")
  - type: dynamic
    name: itemsToTake
    description: "what to grab: 'all' (clean it out), 'valuables' (only worthwhile pieces), 'gold' (just coin), or a comma-separated list of specific item names ('Iron Sword, Health Potion')"
    optional: true
    default: "all"
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
