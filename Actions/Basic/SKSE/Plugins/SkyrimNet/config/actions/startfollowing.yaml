name: StartFollowing
description: "The speaker falls into step behind {{ player.name }} when asked — a guide leading them out of town, a friend tagging along to the next inn, a hireling agreeing to walk the road together. Use only when the speaker would actually agree given the context."
questEditorId: SeverActions
scriptName: SeverActions_Follow
executionFunctionName: StartFollowing
parameterMapping:
  - type: speaker
    name: akActor
    description: the actor falling in behind {{ player.name }}
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "is_in_faction"
        arguments: ["currentActor", "CurrentFollowerFaction"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
