customCategory: items
name: PickUpItem
description: "The speaker stoops to grab something lying out in the open — a sword dropped in the dirt, an apple rolled under a table, a coin spilled across cobbles, a mountain flower at the roadside. For things lying loose in the world, not anything stowed in a chest, sack, or body."
questEditorId: SeverActions
scriptName: SeverActions_Loot
executionFunctionName: PickUpItem_Execute
parameterMapping:
  - type: dynamic
    name: akActor
    description: the actor reaching down to grab it
  - type: dynamic
    name: itemType
    description: name or type of the loose item to pick up (e.g. "Iron Sword", "potion", "gold", "mountain flower")
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
