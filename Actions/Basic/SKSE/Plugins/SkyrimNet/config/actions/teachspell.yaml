customCategory: magic
name: TeachSpell
description: "The speaker walks the player through one of their own spells — guiding the gestures by a College brazier, sketching the runes in chalk on a tavern table, demonstrating the cantrip until it takes. The speaker must actually know the spell (check their Known Spells list). Only use when the player has asked the speaker to teach a specific spell, or during roleplay where it would naturally come up."
questEditorId: SeverActions
scriptName: SeverActions_SpellTeach
executionFunctionName: TeachSpell
parameterMapping:
  - type: speaker
    name: akActor
    description: the actor passing the spell on
  - type: dynamic
    name: spellName
    description: "the spell being taught (e.g. 'Fireball', 'Close Wounds', 'Oakflesh')"
enabled: true
defaultPriority: 5
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
eventString: "{{ actor.name }} teaches {{ spellName }} to {{ player.name }}"
