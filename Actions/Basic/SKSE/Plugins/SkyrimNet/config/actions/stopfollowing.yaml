name: StopFollowing
description: "The speaker stops trailing after {{ player.name }} — pulls up short at the city gate, parts ways at a crossroads, decides they've gone far enough. They go back to their own business."
questEditorId: SeverActions
scriptName: SeverActions_Follow
executionFunctionName: StopFollowing
parameterMapping:
  - type: speaker
    name: akActor
    description: the actor breaking off from {{ player.name }}
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: "is_follower"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
