customCategory: items
name: BringItem
description: "The speaker spots something nearby — a sword on a table, a potion on a shelf, a tool left out — picks it up and carries it across to deliver it. Fetch-and-deliver in one motion."
questEditorId: SeverActions
scriptName: SeverActions_Loot
executionFunctionName: BringItem_Execute
parameterMapping:
  - type: dynamic
    name: akActor
    description: the actor doing the fetching
  - type: dynamic
    name: akTarget
    description: the actor the item is being brought to
  - type: dynamic
    name: itemType
    description: "name or type of the item to fetch (e.g. 'sword', 'potion', 'book')"
enabled: false
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
