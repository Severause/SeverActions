customCategory: magic
name: LearnSpell
description: "The speaker takes a spell from the player — a quiet hour at a College workbench tracing the gestures, an apprentice's curiosity by the fireside, a Restoration trick passed between friends. The player must actually know the spell to pass it on. Only use when the player has offered to teach a specific spell, or during roleplay where learning would make sense."
questEditorId: SeverActions
scriptName: SeverActions_SpellTeach
executionFunctionName: learnspell
parameterMapping:
  - type: speaker
    name: akActor
    description: the actor taking the spell into their own hands
  - type: dynamic
    name: spellName
    description: "the spell being learned (e.g. 'Fireball', 'Close Wounds', 'Oakflesh')"
enabled: true
defaultPriority: 5
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
eventString: "{{ actor.name }} learns {{ spellName }} from {{ player.name }}"
