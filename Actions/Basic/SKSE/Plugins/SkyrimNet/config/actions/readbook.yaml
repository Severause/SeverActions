customCategory: items
name: ReadBook
description: "The speaker pulls a book or note out of their pack and reads it aloud — by the fire at camp, leaning against the inn's railing, sitting in a quiet corner of a library. Reading continues until told to stop."
questEditorId: SeverActions
scriptName: SeverActions_Loot
executionFunctionName: ReadBook_Execute
parameterMapping:
  - type: dynamic
    name: akActor
    description: the actor cracking open the book
  - type: dynamic
    name: bookName
    description: the exact title of the book or note (the speaker must already be carrying it)
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
