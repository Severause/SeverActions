customCategory: items
name: GiveItem
description: "The speaker takes something out of their own pack and hands it to another. A gift, a borrowed tool, a healing draught pressed into a friend's hand, a token offered with both palms. The item leaves the speaker's pack and lands in the other's."
questEditorId: SeverActions
scriptName: SeverActions_Loot
executionFunctionName: GiveItem_Execute
parameterMapping:
  - type: speaker
    name: akActor
    description: the actor parting with the item
  - type: dynamic
    name: akTarget
    description: the actor whose hands the item is going into
  - type: dynamic
    name: itemName
    description: name of the item being handed over (e.g. "Iron Sword", "Health Potion", "her mother's locket")
  - type: dynamic
    name: aiCount
    description: how many units to give (default 1)
    optional: true
    default: 1
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
