customCategory: items
name: GiveItemTrue
description: "Give a physical item from inventory to another person by name."
questEditorId: SeverActions
scriptName: SeverActions_Loot
executionFunctionName: GiveItemTrue_Execute
parameterMapping:
  - type: speaker
    name: akActor
    description: Speaker Actor parameter (triggering entity)
  - type: dynamic
    name: asRecipient
    description: Name of the person receiving the item (e.g. "Lydia", "Hulda")
  - type: dynamic
    name: itemName
    description: The name of the item to give (e.g. "Iron Sword", "Health Potion")
  - type: dynamic
    name: aiCount
    description: Number of items to give (default 1)
    optional: true
    default: 1
enabled: false
defaultPriority: 6
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
