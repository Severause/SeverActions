customCategory: items
name: LootCorpse
description: "The speaker kneels beside a body and pulls what's worth taking from it — coin from a dead bandit's belt, a soldier's blade from cold fingers, a smith's ring off a corpse on the road. Practical, sometimes grim."
questEditorId: SeverActions
scriptName: SeverActions_Loot
executionFunctionName: LootCorpse_Execute
parameterMapping:
  - type: speaker
    name: akActor
    description: the actor kneeling to take from the dead
  - type: dynamic
    name: corpseName
    description: name of the dead person being searched (e.g. "Bandit", "Stormcloak Soldier", a named NPC)
  - type: dynamic
    name: itemsToTake
    description: "what to grab: 'all' (everything they had), 'valuables' (only worthwhile pieces), 'gold' (just coin), or a comma-separated list of specific items"
    optional: true
    default: "all"
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
