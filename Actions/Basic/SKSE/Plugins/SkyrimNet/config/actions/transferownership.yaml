name: TransferOwnership
description: "The speaker formally hands over a property to the player — the deed, the keys, the right to call it home. A Jarl granting a hall after a great service, a tavern owner ceding the inn to its new keeper, a spouse signing over their shared home. Only those with the standing to give it can: its direct owner, a member of its owning faction, or the Jarl of the hold it stands in."
questEditorId: SeverActions
scriptName: SeverActions_Property
executionFunctionName: TransferOwnership
parameterMapping:
  - type: speaker
    name: akActor
    description: the actor with authority to grant the property — its current owner, a member of its owning faction, or the Jarl whose hold contains it
  - type: dynamic
    name: propertyName
    description: name of the property being granted (e.g. 'Bannered Mare', 'Breezehome', 'Honeyside'). Leave empty to grant whatever building the speaker is currently standing in.
eventString: "{{ actor.name }} has transferred ownership of {{ propertyName }} to {{ player.name }}"
enabled: true
priority: 5
