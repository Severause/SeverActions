customCategory: outfit
name: EquipArmor
description: "The speaker pulls specific pieces out of their pack and puts them on — buckling on steel gauntlets before a fight, lacing up boots before a long march, pulling on a circlet to meet a Jarl. Equip one or more named items from inventory; comma-separate for multiple."
questEditorId: SeverActions
scriptName: SeverActions_Outfit
executionFunctionName: EquipMultipleItems_Execute
parameterMapping:
  - type: speaker
    name: akActor
    description: the actor pulling gear on
  - type: dynamic
    name: itemNames
    description: "what to put on, comma-separated for multiple pieces (e.g. 'steel gauntlets, iron helmet')"
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
