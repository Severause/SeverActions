customCategory: outfit
name: UnequipArmor
description: "The speaker takes off specific pieces of what they're wearing — pulling off a helmet that's been chafing all day, peeling away bloody gauntlets, unstrapping a heavy cuirass to breathe easier. Remove one or more named items they currently have on; comma-separate for multiple. For stripping down to the skin use Undress instead."
questEditorId: SeverActions
scriptName: SeverActions_Outfit
executionFunctionName: UnequipMultipleItems_Execute
parameterMapping:
  - type: speaker
    name: akActor
    description: the actor taking pieces of gear off
  - type: dynamic
    name: itemNames
    description: "what to take off, comma-separated for multiple pieces (e.g. 'steel gauntlets, iron helmet')"
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
