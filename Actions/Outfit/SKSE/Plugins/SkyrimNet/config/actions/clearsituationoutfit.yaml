customCategory: outfit
name: ClearSituationOutfit
description: "The speaker decides they no longer want a fixed outfit for one part of their life — no more dressing up automatically for town, no more changing into nightclothes at bedtime. They drop the standing rule for that situation and just wear whatever they happen to have on."
questEditorId: SeverActions
scriptName: SeverActions_Outfit
executionFunctionName: ClearSituationPreset_Execute
parameterMapping:
  - type: speaker
    name: akActor
    description: the actor dropping a standing wardrobe rule
  - type: dynamic
    name: situation
    description: "which part of life they're freeing up: 'town', 'adventure', 'home', or 'sleep'"
enabled: true
eventString: "{{ actor.name }} clears their outfit assignment for {{ situation }} situations"
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
