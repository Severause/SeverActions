customCategory: outfit
name: Undress
description: "The speaker pulls off everything they're wearing — unbuckling armor at the end of a long day, stripping down for a wash at a pool, peeling off road-stained clothes before bed. All equipped armor and clothing comes off."
questEditorId: SeverActions
scriptName: SeverActions_Outfit
executionFunctionName: Undress_Execute
parameterMapping:
  - type: speaker
    name: akActor
    description: the actor stripping down
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
