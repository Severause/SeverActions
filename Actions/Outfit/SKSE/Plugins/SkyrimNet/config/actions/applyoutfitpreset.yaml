customCategory: outfit
name: ApplyOutfitPreset
description: "The speaker ducks behind a screen and emerges in a familiar set of clothes — the leather they always wear into a fight, the wool dress kept for hearth and home, the velvets they don for a Jarl's audience. They change into a previously saved outfit by name."
questEditorId: SeverActions
scriptName: SeverActions_Outfit
executionFunctionName: ApplyOutfitPreset_Execute
parameterMapping:
  - type: speaker
    name: akActor
    description: the actor changing clothes
  - type: dynamic
    name: presetName
    description: "which saved outfit to put on (e.g. 'home', 'combat', 'formal', 'casual')"
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
