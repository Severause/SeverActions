customCategory: outfit
name: SetSituationOutfit
description: "The speaker sets a standing rule for one part of their life — 'when we're in town I dress decent', 'on the road I wear my armor', 'at home it's the wool dress', 'nightclothes for bed'. They'll change into the assigned outfit automatically whenever that situation comes up."
questEditorId: SeverActions
scriptName: SeverActions_Outfit
executionFunctionName: SetSituationPreset_Execute
parameterMapping:
  - type: speaker
    name: akActor
    description: the actor laying down a standing wardrobe rule
  - type: dynamic
    name: situation
    description: "when this outfit applies: 'town', 'adventure', 'home', or 'sleep'"
  - type: dynamic
    name: presetName
    description: "the saved outfit they'll wear in that situation"
enabled: true
eventString: "{{ actor.name }} assigns their {{ presetName }} outfit for {{ situation }} situations"
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
