customCategory: outfit
name: GetDressed
description: "The speaker reaches for the clothes folded over a chair, the armor stacked by the bedroll, the robes hung on a peg — and puts back on what they had removed earlier. Dressed again, ready to move."
questEditorId: SeverActions
scriptName: SeverActions_Outfit
executionFunctionName: Dress_Execute
parameterMapping:
  - type: speaker
    name: akActor
    description: the actor pulling their clothes back on
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
