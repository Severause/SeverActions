customCategory: outfit
name: SaveOutfitPreset
description: "The speaker looks down at what they're currently wearing and gives it a name to come back to — 'this is my combat kit', 'this is my home dress', 'this is what I wear for court'. Saved for later recall with ApplyOutfitPreset."
questEditorId: SeverActions
scriptName: SeverActions_Outfit
executionFunctionName: SaveOutfitPreset_Execute
parameterMapping:
  - type: speaker
    name: akActor
    description: the actor naming the outfit they're wearing
  - type: dynamic
    name: presetName
    description: "short label to remember the outfit by (e.g. 'home', 'combat', 'formal')"
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
