customCategory: arrest
name: OrderRelease
description: "The Jarl or magistrate weighs the case in the hall, finds the charges thin or the prisoner's account convincing, and waves them off — 'Cut them loose.' Only valid when a prisoner stands before the speaker after a DispatchGuardToArrest brought them in for judgment."
questEditorId: SeverActions
scriptName: SeverActions_ArrestJudgment
executionFunctionName: OrderRelease_Execute
parameterMapping:
  - type: speaker
    name: akSender
    description: the authority deciding to let the prisoner walk
enabled: true
defaultPriority: 9
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "is_busy"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: true
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "busy_reason"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: "judgment"
    logicalOperator: "AND"
    required: true
  # Replaced an 11-condition OR ladder (9 GuardFactionX + JobJarlFaction
  # + JobHousecarlFaction) with the single native is_guard_or_authority
  # decorator. Same semantics — see SkyrimNetBridge.h for the cached
  # faction-pointer set, plus mod-added holds via HoldResolver.
  - conditions:
      - decoratorName: "is_guard_or_authority"
        arguments: ["currentActor"]
        comparisonOperator: "!="
        expectedValue: ""
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
