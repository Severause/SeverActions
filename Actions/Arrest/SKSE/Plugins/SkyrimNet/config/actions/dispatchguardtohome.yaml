customCategory: arrest
name: DispatchGuardToHome
description: "The guard sets out to toss a suspect's home for evidence — rifling drawers and chests for skooma vials, forged papers, stolen silverware, a Talos shrine in the cellar, necromancer's tools tucked under a floorboard. They walk there, search the containers inside, then come back to the one who sent them with whatever they turned up. Use this rather than a travel action whenever the guard's purpose is to search, investigate, or sweep a home for contraband."
questEditorId: SeverActions
scriptName: SeverActions_Arrest
executionFunctionName: DispatchGuardToHome_Execute
parameterMapping:
  - type: speaker
    name: akGuard
    description: the guard heading out on the search
  - type: dynamic
    name: targetName
    description: "the full display name of the suspect whose home is being tossed"
  - type: dynamic
    name: senderName
    description: "who ordered the search — the guard reports back to them with whatever they found"
  - type: dynamic
    name: reason
    description: "what they're looking for (e.g. 'skooma dealing', 'necromancy', 'talos worship', 'thieving')"
    optional: true
    default: "suspicious activity"
enabled: true
defaultPriority: 7
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "is_busy"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  # Replaced an 11-condition OR ladder (9 GuardFactionX + JobJarlFaction
  # + JobHousecarlFaction) with the single native is_guard_or_authority
  # decorator. Same semantics — see SkyrimNetBridge.h for the cached
  # faction-pointer set, plus mod-added holds via HoldResolver.
  - conditions:
      - decoratorName: "is_guard_or_authority"
        arguments: ["currentActor"]
        comparisonOperator: "!="
        expectedValue: ""
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "is_in_faction"
        arguments: ["currentActor", "SeverActions_DispatchFaction"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
eventString: "{{ actor.name }} has been dispatched to search {{ targetName }}'s home for evidence related to {{ reason }}"
