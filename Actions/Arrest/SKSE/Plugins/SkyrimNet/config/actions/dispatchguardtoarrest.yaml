customCategory: arrest
name: DispatchGuardToArrest
description: "The guard sets off across the hold to track down a named suspect and bring them in — riding out to a bandit hideout, walking down to the docks for a fence, knocking at a farmer's door. If a sender is named, the prisoner is hauled back to them for judgment rather than straight to the jail."
questEditorId: SeverActions
scriptName: SeverActions_Arrest
executionFunctionName: DispatchGuardToArrest_Execute
parameterMapping:
  - type: speaker
    name: akGuard
    description: the guard heading out on the errand
  - type: dynamic
    name: targetName
    description: "the full display name of the person to be brought in"
  - type: dynamic
    name: senderName
    description: "who ordered the arrest — the prisoner is delivered to them for judgment. Leave empty to take the prisoner straight to the cells."
    optional: true
    default: ""
enabled: true
defaultPriority: 7
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "is_busy"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  # Replaced an 11-condition OR ladder (9 GuardFactionX + JobJarlFaction
  # + JobHousecarlFaction) with the single native is_guard_or_authority
  # decorator. Same semantics — see SkyrimNetBridge.h for the cached
  # faction-pointer set, plus mod-added holds via HoldResolver.
  - conditions:
      - decoratorName: "is_guard_or_authority"
        arguments: ["currentActor"]
        comparisonOperator: "!="
        expectedValue: ""
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "is_in_faction"
        arguments: ["currentActor", "SeverActions_DispatchFaction"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
eventString: "{{ actor.name }} has been dispatched to arrest {{ targetName }}"
