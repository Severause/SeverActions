customCategory: arrest
name: AddBountyToPlayer
description: "The guard logs a fresh crime against the player's name in this hold — a stabbing in the market square, coin lifted from a merchant's purse, a knife pulled in the wrong tavern. Use this FIRST when the speaker witnessed a crime, since ArrestPlayer needs an existing bounty to bite. Guards may also stack bounty at their own discretion for backtalk, threats, or suspicious behavior."
questEditorId: SeverActions
scriptName: SeverActions_ArrestBounty
executionFunctionName: AddBountyToPlayer_Internal
parameterMapping:
  - type: speaker
    name: akGuard
    description: the guard writing the charge into the books
  - type: dynamic
    name: bountyAmount
    description: "how much gold the offense is worth on the books — assault 40-200, theft 75-300, murder 1000-3000, trespass 75-150, pickpocket 25-175"
  - type: dynamic
    name: crimeType
    description: "what they're being charged with: assault, theft, murder, trespass, pickpocket, contempt, or abuse_of_power"
enabled: true
defaultPriority: 7
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "is_busy"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  # Replaced an 11-condition OR ladder (9 GuardFactionX + JobJarlFaction
  # + JobHousecarlFaction) with the single native is_guard_or_authority
  # decorator. Same semantics — see SkyrimNetBridge.h for the cached
  # faction-pointer set, plus mod-added holds via HoldResolver.
  - conditions:
      - decoratorName: "is_guard_or_authority"
        arguments: ["currentActor"]
        comparisonOperator: "!="
        expectedValue: ""
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "is_in_faction"
        arguments: ["currentActor", "SeverActions_DispatchFaction"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
