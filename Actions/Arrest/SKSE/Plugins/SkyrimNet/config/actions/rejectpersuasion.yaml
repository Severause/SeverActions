customCategory: arrest
name: RejectPersuasion
description: "The guard listens to the player's argument and shakes their head — bounty stands, story doesn't hold up, the law is the law. They demand the player face justice and the confrontation moves to submit-or-resist."
questEditorId: SeverActions
scriptName: SeverActions_ArrestPlayer
executionFunctionName: RejectPersuasion_Internal
parameterMapping:
  - type: speaker
    name: akGuard
    description: the guard unmoved by the player's case
enabled: true
defaultPriority: 9
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  # Replaced an 11-condition OR ladder (9 GuardFactionX + JobJarlFaction
  # + JobHousecarlFaction) with the single native is_guard_or_authority
  # decorator. Same semantics — see SkyrimNetBridge.h for the cached
  # faction-pointer set, plus mod-added holds via HoldResolver.
  - conditions:
      - decoratorName: "is_guard_or_authority"
        arguments: ["currentActor"]
        comparisonOperator: "!="
        expectedValue: ""
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "is_in_faction"
        arguments: ["currentActor", "SeverActions_DispatchFaction"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
