customCategory: arrest
name: FreeFromJail
description: "The guard turns the key in a cell door and lets a prisoner out — sentence served, charges dropped, jarl's pardon, or a quiet favor done. The freed NPC shakes off the cell and returns to their normal life."
questEditorId: SeverActions
scriptName: SeverActions_Arrest
executionFunctionName: FreeNPC_Internal
parameterMapping:
  - type: speaker
    name: akGuard
    description: the guard turning the key
  - type: dynamic
    name: akTarget
    description: the prisoner walking out of the cell
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "is_busy"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  # Replaced an 11-condition OR ladder (9 GuardFactionX + JobJarlFaction
  # + JobHousecarlFaction) with the single native is_guard_or_authority
  # decorator. Same semantics — see SkyrimNetBridge.h for the cached
  # faction-pointer set, plus mod-added holds via HoldResolver.
  - conditions:
      - decoratorName: "is_guard_or_authority"
        arguments: ["currentActor"]
        comparisonOperator: "!="
        expectedValue: ""
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "is_in_faction"
        arguments: ["currentActor", "SeverActions_DispatchFaction"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
