name: SitOrLayDown
description: "The speaker drops into a chair by the hearth, stretches out on a tavern bench, kneels at a shrine, slumps onto a straw bed at the inn. Pick a piece of furniture from the nearby objects list and they'll use it."
questEditorId: SeverActions
scriptName: SeverActions_Furniture
executionFunctionName: UseFurniture_Execute
parameterMapping:
  - type: speaker
    name: akActor
    description: the actor settling in
  - type: dynamic
    name: furnitureFormId
    description: the FormID of the chair, bench, bed, or shrine to use (taken from the nearby objects list)
enabled: true
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
