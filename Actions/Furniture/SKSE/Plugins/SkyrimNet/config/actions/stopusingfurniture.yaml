name: StopUsingFurniture
description: "The speaker pushes back from the chair, rolls off the bed, or rises from the shrine — done sitting, done sleeping, done praying — and stands on their own feet again."
questEditorId: SeverActions
scriptName: SeverActions_Furniture
executionFunctionName: StopUsingFurniture_Execute
parameterMapping:
  - type: speaker
    name: akActor
    description: the actor getting back up
enabled: true
defaultPriority: 7
eligibilityRules:
  - conditions:
      - decoratorName: "is_in_combat"
        arguments: ["currentActor"]
        comparisonOperator: "=="
        expectedValue: false
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "SexLabAnimatingFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
  - conditions:
      - decoratorName: "get_faction_rank"
        arguments: ["currentActor", "OStimExcitementFaction"]
        comparisonOperator: "<"
        expectedValue: 0
    logicalOperator: "AND"
    required: true
